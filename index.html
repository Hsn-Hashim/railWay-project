<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Train Reservation System</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* تعتيم الخلفية شوي عشان يبرز الزر أكثر */
        .background-blur {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('pics/pic3.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(8px) brightness(0.7); 
            transform: scale(1.1);
            z-index: 1;
        }

        .content-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        /* عنوان الواجهة */
        .welcome-text {
            color: #ffffff;
            font-size: 3em;
            font-weight: 700;
            margin-bottom: 40px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.6);
            text-align: center;
            letter-spacing: 2px;
        }

        /* التصميم الاحترافي للزر - زجاجي و ينبض */
        .welcome-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 50px;
            font-size: 1.3em;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            letter-spacing: 1px;
            
            /* تأثير الزجاج */
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: pulse 2s infinite; /* تشغيل النبض */
        }

        .welcome-btn i {
            font-size: 1.4em;
            transition: transform 0.3s ease;
        }

        /* التأثير عند وضع الماوس على الزر */
        .welcome-btn:hover {
            background: rgba(0, 86, 179, 0.9); /* يتحول للون أزرق قوي */
            border-color: rgba(255, 255, 255, 0.8);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 86, 179, 0.6);
            animation: none; /* إيقاف النبض لأن المستخدم انتبه له خلاص */
        }

        /* تحريك السهم لليمين عند الـ Hover */
        .welcome-btn:hover i {
            transform: translateX(6px);
        }

        /* خوارزمية النبض (Pulse) لجذب الانتباه */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.5); }
            70% { box-shadow: 0 0 0 25px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
    </style>
</head>
<body>

    <div class="background-blur"></div>

    <div class="content-overlay">
        <h1 class="welcome-text">Railway Reservation</h1>
        <a href="userPage.html" class="welcome-btn">
            Get Started <i class='bx bx-right-arrow-alt'></i>
        </a>
    </div>

</body>
</html>
