<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart RailWay - Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="logInCard">
        <h1>Create Account</h1>

        <form id="signUpForm">
            <div class="textInput">
                <label for="reg-name">Full Name</label>
                <input type="text" id="reg-name" required>
            </div>

            <div class="textInput">
                <label for="reg-national-id">National ID</label>
                <input type="text" id="reg-national-id" required>
            </div>

            <div class="textInput">
                <label for="reg-phone">Phone Number</label>
                <input type="tel" id="reg-phone" required>
            </div>

            <div class="textInput">
                <label for="reg-dob">Date of Birth</label>
                <input type="date" id="reg-dob" required>
            </div>

            <div class="textInput">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" required>
            </div>
 
            <div class="textInput">
                <label for="reg-pass">Password</label>
                <input type="password" id="reg-pass" required>
            </div>

            <button type="submit" class="sub-button" onclick="registerUser(event)">Sign Up</button>
            
            <label>Already have an account?</label>
            <a href="sign-in.html">Log in</a>
        </form>
    </div>

     <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="signup.js"></script>
</body>
</html>
