<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home Screen</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    
    <!-- الشريط الجانبي -->
    <nav class="sidebar close">
        <header>
           <div class="image-text">
            <span class="image">
                <img src="pics\train2.jpg" alt="train">
            </span>
            <div class="text header-text">
                <span class="name">TRAIN</span>
                <span class="profession">Options</span>
            </div>
           </div>
           <i class='bx bx-chevron-right toggle'></i>
        </header>

        <div class="menu-bar">
            <div class="menu">
                <ul class="menu-links">
                    <li class="nav-link">
                        <a href="#" onclick="fetchTrips()"><i class="fa-solid fa-receipt icon"></i><span class="text nav-text">Reservation</span></a>
                    </li>
                    <li class="nav-link">
                        <a href="#" onclick="activeBookings(); return false"><i class="fa-duotone fa-solid fa-circle-check icon"></i><span class="text nav-text">Active Booking</span></a>
                    </li>
                    <li class="nav-link">
                        <a href="#" onclick="BookingHistory()"><i class="fa-solid fa-clock-rotate-left icon"></i><span class="text nav-text">Booking History</span></a>
                    </li>
                    <li class="nav-link">
                        <a href="#"><i class="fa-sharp fa-solid fa-circle-user icon"></i><span class="text nav-text">Profile</span></a>
                    </li>
                </ul>
            </div>
            <div class="bottom-content">
                <li class="">
                    <a id="logOut" href="#"><i class='bx bx-log-out icon'></i><span class="text nav-text">Logout</span></a>
                </li>
            </div>
        </div>
    </nav>

    <!-- محتوى الصفحة الفعلي (يجب أن يكون داخل home) -->
    <section class="home">
        <div class="dashboard">
            <div class="header-bar">
                <h1 id="head" style="color: #333;">Available Trips</h1>
            </div>
            
            <div id="Container">
                <p>Loading trips...</p>
            </div>
        </div>
    </section>
    <!-- نافذة الـ QR Code (مخفية افتراضياً) -->
<div id="qrPopup" class="hidden" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; display: flex; justify-content: center; align-items: center;">
    <div style="background: white; padding: 30px; border-radius: 10px; text-align: center;">
        <h2 style="margin-bottom: 20px;">Ticket QR Code</h2>
        <!-- الديف اللي بنرسم داخله الباركود -->
        <div id="qrcodeBox"></div>
        <button class="sub-button" style="margin-top: 20px; width: 100%;" onclick="closeQR()">Close</button>
    </div>
</div>

    <!-- السكربتات -->
     <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script src="userHomeScreen.js"></script>
</body>
</html>
